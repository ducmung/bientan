<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sosen Energy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            color: #333;
            min-height: 100vh;
            padding: 10px;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ================= KHUNG ĐỒ HỌA TRUNG TÂM ================= */
        .diagram-panel {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            aspect-ratio: 1 / 1; 
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
        }

        .node {
            position: absolute;
            transform: translate(-50%, -50%); 
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 10px 5px;
            text-align: center;
            width: 85px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .node-center { 
            width: 130px; 
            height: 130px; 
            padding: 0px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.95);
        }
        
        .node-center img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 20px;
            transform: scale(1.15); 
            mix-blend-mode: multiply; 
        }

        #lbl-status {
            position: absolute;
            bottom: -28px; 
            font-size: 13px;
            font-weight: 800;
            background: rgba(255,255,255,0.9); 
            padding: 4px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #888;
            white-space: nowrap; 
            z-index: 20;
        }

        .node h3 { font-size: 11px; color: #666; font-weight: 700; margin-bottom: 2px; }
        .node .val { font-size: 16px; font-weight: 800; color: #111; }
        .node .unit { font-size: 10px; color: #888; }
        .icon { font-size: 20px; margin-bottom: 2px; }

        .pos-pv { top: 20%; left: 20%; }
        .pos-grid { top: 20%; left: 80%; }
        .pos-batt { top: 80%; left: 20%; }
        .pos-load { top: 80%; left: 80%; }
        .pos-inv { top: 50%; left: 50%; }

        .line {
            position: absolute;
            height: 3px;
            background: #cbd5e1;
            width: 42.42%; 
            z-index: 1;
        }

        .line-pv { top: 20%; left: 20%; transform-origin: left center; transform: rotate(45deg); }
        .line-grid { top: 20%; right: 20%; transform-origin: right center; transform: rotate(-45deg); }
        .line-batt { top: 80%; left: 20%; transform-origin: left center; transform: rotate(-45deg); }
        .line-load { top: 80%; right: 20%; transform-origin: right center; transform: rotate(45deg); }

        .dot {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            top: -3.5px;
            display: none; 
        }

        @keyframes flowInL { 0% { left: 0%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { left: 100%; opacity: 0; } }
        @keyframes flowOutL { 0% { left: 100%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { left: 0%; opacity: 0; } }
        @keyframes flowInR { 0% { right: 0%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { right: 100%; opacity: 0; } }
        @keyframes flowOutR { 0% { right: 100%; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { right: 0%; opacity: 0; } }

        /* ================= KHUNG THỐNG KÊ ================= */
        .stats-panel { display: flex; flex-direction: column; gap: 15px; }
        .stat-card { background: rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stat-header h2 { font-size: 16px; color: #444; }

        .progress-bar { width: 100%; height: 12px; background: #eee; border-radius: 10px; display: flex; overflow: hidden; margin-bottom: 15px; }
        .bar-batt { background: #00cc66; width: 0%; transition: width 1s; }

        .list-detail { font-size: 13px; color: #555; }
        .list-detail div { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #ddd; padding-bottom: 4px;}
        .list-detail div:last-child { border: none; }
        .list-detail span { font-weight: 800; color: #111; }

        @media (min-width: 768px) {
            .app-container { flex-direction: row; align-items: stretch; }
            .diagram-panel { flex: 1; max-width: none; }
            .stats-panel { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="diagram-panel">
            <div class="line line-pv"><div class="dot" id="dot-pv" style="background: #ffaa00;"></div></div>
            <div class="line line-grid"><div class="dot" id="dot-grid"></div></div>
            <div class="line line-batt"><div class="dot" id="dot-batt"></div></div>
            <div class="line line-load"><div class="dot" id="dot-load" style="background: #0088ff;"></div></div>

            <div class="node pos-pv">
                <div class="icon">☀️</div>
                <h3>MẶT TRỜI</h3>
                <div class="val" id="lbl-pv">0</div>
                <div class="unit">W</div>
            </div>

            <div class="node pos-grid">
                <div class="icon">🗼</div>
                <h3>LƯỚI EVN</h3>
                <div class="val" id="lbl-grid">0</div>
                <div class="unit">W</div>
            </div>

            <div class="node pos-batt">
                <div class="icon">🔋</div>
                <h3>PIN LƯU TRỮ</h3>
                <div class="val" id="lbl-batt">0</div>
                <div class="unit">W</div>
                <div style="font-size: 11px; color: #00cc66; font-weight:bold; margin-top: 3px;" id="lbl-soc">0%</div>
            </div>

            <div class="node pos-load">
                <div class="icon">🏠</div>
                <h3>TIÊU THỤ</h3>
                <div class="val" id="lbl-load">0</div> 
                <div class="unit">W</div>
            </div>

            <div class="node node-center pos-inv">
                <img src="png100-t3-scale100.png" alt="Inverter">
                <div id="lbl-status">Đang tải...</div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-header">
                    <h2>📊 THỐNG KÊ HÔM NAY</h2>
                </div>
                <div class="list-detail">
                    <div>☀️ Sản lượng PV: <span id="stat-pv-today">0 kWh</span></div>
                    <div>🔋 Pin đã xả: <span id="stat-bat-dis">0 kWh</span></div>
                    <div>⚡ Pin đã sạc: <span id="stat-bat-chg">0 kWh</span></div>
                    <div style="color: #d35400;">🏠 Tổng tiêu thụ: <span id="stat-load-total">0 kWh</span></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <h2>Dung lượng Pin & Áp</h2>
                </div>
                <div class="progress-bar">
                    <div class="bar-batt" id="bar-soc"></div>
                </div>
                <div class="list-detail">
                    <div>Điện áp Pin: <span id="stat-v">0 V</span></div>
                    <div>Dòng điện: <span id="stat-a">0 A</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sosen-inverter-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const dotPV = document.getElementById('dot-pv');
        const dotGrid = document.getElementById('dot-grid');
        const dotBatt = document.getElementById('dot-batt');
        const dotLoad = document.getElementById('dot-load');
        const lblStatus = document.getElementById('lbl-status');

        // LẮNG NGHE DỮ LIỆU TỨC THỜI
        database.ref('/SosenSystem/Live').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                // ĐỔI TOÀN BỘ SANG ĐƠN VỊ W (LÀM TRÒN SỐ NGUYÊN)
                let pvInW = Math.round(data.PV_Power * 1000); // Từ kW ra W
                let gridInW = Math.round(data.Grid_Power);    // ESP32 đang gửi W
                let loadInW = Math.round(data.Load_Power);    // ESP32 đang gửi W
                let battInW = Math.round(data.Batt_Voltage * data.Batt_Current); // V * A = W

                // Hiển thị lên HTML
                document.getElementById('lbl-pv').innerText = pvInW;
                document.getElementById('lbl-grid').innerText = Math.abs(gridInW);
                document.getElementById('lbl-load').innerText = loadInW; 
                document.getElementById('lbl-batt').innerText = Math.abs(battInW);
                document.getElementById('lbl-soc').innerText = data.Batt_SOC + '%';
                
                document.getElementById('stat-v').innerText = data.Batt_Voltage.toFixed(1) + ' V';
                document.getElementById('stat-a').innerText = data.Batt_Current.toFixed(1) + ' A';
                document.getElementById('bar-soc').style.width = data.Batt_SOC + '%';

                // ----- CẬP NHẬT CHỮ TRẠNG THÁI -----
                lblStatus.innerText = data.Batt_Status;
                if (data.Batt_Status === "Đang Sạc") {
                    lblStatus.style.color = '#00cc66'; // Xanh lá
                } else if (data.Batt_Status === "Đang Xả") {
                    lblStatus.style.color = '#ff4444'; // Đỏ
                } else {
                    lblStatus.style.color = '#888'; // Xám
                }

                // ----- LOGIC CHẤM CHẠY (Ngưỡng 20W để tránh nhiễu) -----
                
                // PV
                if(pvInW > 20) { dotPV.style.display = 'block'; dotPV.style.animation = 'flowInL 1.5s infinite linear'; } 
                else { dotPV.style.display = 'none'; }

                // Tải
                if(loadInW > 20) { dotLoad.style.display = 'block'; dotLoad.style.animation = 'flowOutR 1.5s infinite linear'; } 
                else { dotLoad.style.display = 'none'; }

                // Pin
                if (data.Batt_Current < -0.5) { // Đang sạc
                    dotBatt.style.display = 'block';
                    dotBatt.style.background = '#ff4444'; 
                    dotBatt.style.animation = 'flowOutL 1.5s infinite linear';
                } else if (data.Batt_Current > 0.5) { // Đang xả
                    dotBatt.style.display = 'block';
                    dotBatt.style.background = '#00cc66'; 
                    dotBatt.style.animation = 'flowInL 1.5s infinite linear';
                } else {
                    dotBatt.style.display = 'none'; 
                }

                // Lưới EVN
                if (gridInW > 20) { // Đang mua
                    dotGrid.style.display = 'block';
                    dotGrid.style.background = '#ff4444'; 
                    dotGrid.style.animation = 'flowInR 1.5s infinite linear';
                } else if (gridInW < -20) { // Đang bán
                    dotGrid.style.display = 'block';
                    dotGrid.style.background = '#00cc66'; 
                    dotGrid.style.animation = 'flowOutR 1.5s infinite linear';
                } else {
                    dotGrid.style.display = 'none';
                }
            }
        });

        // LẮNG NGHE DỮ LIỆU THỐNG KÊ NGÀY
        database.ref('/SosenSystem/Daily_Energy').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('stat-pv-today').innerText = data.PV_Today.toFixed(1) + ' kWh';
                document.getElementById('stat-bat-dis').innerText = data.Bat_Discharge_Today.toFixed(1) + ' kWh';
                document.getElementById('stat-bat-chg').innerText = data.Bat_Charge_Today.toFixed(1) + ' kWh';
                
                let loadTotal = data.Load_Total !== undefined ? data.Load_Total : 0;
                document.getElementById('stat-load-total').innerText = loadTotal.toFixed(1) + ' kWh';
            }
        });
    </script>
</body>
</html>
